<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pré-Agendamento Test Drive - LUXX MOTORS</title>
        <!-- Scripts da página: controle de carregamento e interação com API -->
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Página: Página de agendamento de test drive e captura dos dados do cliente. -->


    <header class="bg-slate-800 text-white h-20 flex items-center px-8 justify-between sticky top-0 z-50">
    
        <div class="flex items-center">
            <a href="index.html">
            <img src="logo-luxx4.jpg" alt="LUXX MOTORS" class="h-12 w-auto object-contain">
            </a>
        </div>

    <nav>
        <ul class="flex gap-6 text-sm font-medium">
            <li><a href="index.html" class="hover:text-gray-300 transition-colors">Home</a></li>
            <li><a href="veiculos.html" class="hover:text-gray-300 transition-colors">Veículos</a></li>
            <li><a href="cadastro.html" class="hover:text-gray-300 transition-colors">Cadastro</a></li>
            <li><a href="testdrive.html" class="hover:text-gray-300 transition-colors">Test Drive</a></li>
            <li><a href="financiamento.html" class="hover:text-gray-300 transition-colors">Financiamento</a></li>
            <li><a href="revisao.html" class="hover:text-gray-300 transition-colors">Revisão</a></li>
        </ul>
    </nav>

    <form action="busca.html" method="GET" class="flex gap-2">
        <input type="text" name="q" placeholder="Pesquisar carro..." 
               class="px-4 py-2 border rounded-md text-black focus:outline-none focus:ring-2 focus:ring-slate-400 text-sm">
        <button type="submit" class="bg-slate-500 hover:bg-slate-600 px-4 py-2 rounded-md transition-colors text-sm">
            Buscar
        </button>
    </form>
</header>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <div class="bg-slate-800 px-6 py-4">
                <h1 class="text-white text-2xl font-bold">Pré-Agendamento Test Drive</h1>
            </div>

            <form id="formTestDrive" onsubmit="agendarTestDrive(event)" class="p-6 space-y-6">
                <div class="border-b pb-4">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Dados do Usuário</h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Nome</label>
                            <input type="text" id="nome" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-500">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">CPF</label>
                            <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14"  class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">CNH</label>
                            <input type="text" id="cnh" placeholder="00000000000" maxlength="11" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                            <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Modelo</label>
                        <select id="modelo" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                            <option value="">Carregando modelos...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cor</label>
                        <select id="cor" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                            <option value="">Carregando cores...</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Câmbio</label>
                        <select id="cambio" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none">
                            <option value="">Carregando câmbios...</option>
                        </select>
                    </div>
                </div>

                <div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Agendar Data</h2>
                    <div>
                                <option>Cinza</option>
                                <option>Vermelho</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">Agendar Data</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Data <span class="text-xs text-gray-500 ml-2">(visita à concessionária)</span>
                            </label>
                            <input type="date" id="data" required 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Horário</label>
                            <input type="time" id="horario" required 
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-slate-500">
                        </div>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-600 text-white py-3 rounded-md transition-colors font-medium">
                        Agendar Test Drive
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5107/api/veiculos';

        async function carregarDadosParaTestDrive() {
            try {
                // Faz a chamada para a API
                const response = await fetch(`${API_URL}/filtros`);
                const filtros = await response.json();

                console.log("Dados recebidos da API:", filtros); // Debug: Veja no F12 se os dados chegaram

                // Preenche os Modelos (usando ID no value e Nome no texto)
                const selectModelo = document.getElementById('modelo');
                    if (selectModelo) {
                        // Tenta pegar de 'veiculosCompletos' ou de 'modelos' (o que existir no JSON)
                        const listaModelos = filtros.veiculosCompletos || filtros.modelos;

                        if (listaModelos && Array.isArray(listaModelos)) {
                            selectModelo.innerHTML = '<option value="">Selecione um modelo</option>';
                            listaModelos.forEach(item => {
                                // Se o item for objeto {id_veiculo, modelo}, usa as propriedades
                                // Se for apenas string, usa o próprio item
                                const id = item.id_veiculo || item.id || item; // Tenta várias chaves para garantir
                                const nome = item.modelo || item.nome || item; // Tenta várias chaves para garantir
                                
                                selectModelo.innerHTML += `<option value="${id}">${nome}</option>`;
                                console.log(`Carregando: Nome=${nome}, ID=${id}`);
                            });
                        } else {
                            selectModelo.innerHTML = '<option value="">Nenhum modelo encontrado</option>';
                            console.error("A lista de modelos não foi encontrada no JSON:", filtros);
                        }
                    }

                // Preenche as Cores (Normalmente são apenas textos)
                const selectCor = document.getElementById('cor');
                if (selectCor && filtros.cores) {
                    selectCor.innerHTML = '<option value="">Selecione uma cor</option>';
                    filtros.cores.forEach(cor => {
                        selectCor.innerHTML += `<option value="${cor}">${cor}</option>`;
                    });
                }

                // Preenche os Câmbios
                const selectCambio = document.getElementById('cambio');
                if (selectCambio && filtros.cambios) {
                    selectCambio.innerHTML = '<option value="">Selecione um câmbio</option>';
                    filtros.cambios.forEach(cambio => {
                        selectCambio.innerHTML += `<option value="${cambio}">${cambio}</option>`;
                    });
                }

            } catch (error) {
                console.error("Erro ao carregar dados do banco:", error);
                // Fallback: Se a API falhar, remove o "Carregando..."
                document.getElementById('modelo').innerHTML = '<option value="">Erro ao carregar</option>';
            }
        }

        // Bloquear datas passadas no calendário
        const inputData = document.getElementById('data');
        inputData.min = new Date().toISOString().split('T')[0];

        // Máscara de CPF
        document.getElementById('cpf').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d)/, '$1.$2');
                v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                e.target.value = v;
            }
        });

        async function agendarTestDrive(event) {
            event.preventDefault();

            const cpfInput = document.getElementById('cpf').value;

            try {
                // Busca o ID do Cliente através do CPF
                const url = `http://localhost:5107/api/clientes/verificar/${encodeURIComponent(cpfInput)}`;

                console.log("Chamando URL:", url); // Veja no console (F12) se a URL está certa

                const responseCliente = await fetch(url);
                
                if (responseCliente.status === 404) {
                    alert("CPF não localizado! Por favor, realize o cadastro primeiro.");
                    window.location.href = "cadastro.html";
                    return;
                }

                const cliente = await responseCliente.json();
                // Gera um número inteiro aleatório entre 1 e 7
                const vendedorAleatorio = Math.floor(Math.random() * 7) + 1;

                // 2. Monta o objeto exatamente como a sua tabela do banco pede
                const agendamento = {
                    Id_cliente: cliente.id_cliente, // Letra inicial maiúscula como no Model
                    Id_veiculo: parseInt(document.getElementById('modelo').value),
                    Id_vendedor: vendedorAleatorio,
                    Horario: "09:00:00",
                    Data_agendamento: document.getElementById('data').value, // YYYY-MM-DD
                    Status: "Agendado"
                };

                // Log para conferir no console antes de enviar
                console.log("Enviando dados:", JSON.stringify(agendamento));

                const responsePost = await fetch('http://localhost:5107/api/testdrive', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(agendamento)
                });

                if (responsePost.ok) {
                    alert("✅ Agendamento realizado com sucesso!");
                    window.location.href = "index.html";
                } else {
                    alert("❌ Erro ao salvar agendamento.");
                }

            } catch (error) {
                console.error("Erro no fluxo de agendamento:", error);
                alert("Erro de conexão com o servidor.");
            }
        }

            function processarAgendamento() {
                // Aqui coloca a chamada POST para salvar o agendamento no banco
                alert("CPF Validado! Agendamento realizado com sucesso. Esperamos você aqui.");
                // Exemplo: fetch('api/agendamentos', { method: 'POST', ... })
            }
            
        // Chama a função assim que a página carregar
        window.onload = carregarDadosParaTestDrive;
    </script>

        <!-- Plugin de acessibilidade VLibras -->
        <div vw class="enabled">

                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>
            new window.VLibras.Widget('https://vlibras.gov.br/app');
        </script>
</body>
</html>
