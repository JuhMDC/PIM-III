<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente - LUXX MOTORS</title>
        <!-- Scripts da página: controle de carregamento e interação com API -->
<script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .error-text { color: #dc2626; font-size: 0.75rem; transition: all 0.3s; }
        .success-text { color: #16a34a; font-size: 0.75rem; transition: all 0.3s; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">


    <header class="bg-slate-800 text-white h-20 flex items-center px-8 justify-between sticky top-0 z-50">
        
        <div class="flex items-center">
            <a href="index.html">
                <img src="logo-luxx4.jpg" alt="LUXX MOTORS" class="h-12 w-auto object-contain">
            </a>
        </div>
        
        <nav>
            <ul class="flex gap-6 text-sm font-medium">
                <li><a href="index.html" class="hover:text-gray-300">Home</a></li>
                <li><a href="veiculos.html" class="hover:text-gray-300">Veículos</a></li>
                <li><a href="cadastro.html" class="text-gray-300 border-b-2 border-gray-300">Cadastro</a></li>
                <li><a href="testdrive.html" class="hover:text-gray-300">Test Drive</a></li>
                <li><a href="financiamento.html" class="hover:text-gray-300">Financiamento</a></li>
                <li><a href="revisao.html" class="hover:text-gray-300">Revisão</a></li>
            </ul>
        </nav>
        <form action="busca.html" method="GET" class="flex gap-2">
            <input type="text" name="q" placeholder="Pesquisar..." class="px-4 py-2 border rounded-md text-black text-sm outline-none">
            <button type="submit" class="bg-slate-600 hover:bg-slate-700 px-4 py-2 rounded-md transition-colors text-sm">Buscar</button>
        </form>
    </header>

    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white rounded-lg shadow-lg overflow-hidden border border-gray-200">
            
            <div class="bg-slate-800 px-6 py-4">
                <h1 class="text-white text-2xl font-bold">Cadastro de Cliente</h1>
            </div>

            <form id="formCadastro" class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Nome Completo</label>
                    <input type="text" id="nome" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-slate-500 outline-none transition-all">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">CPF</label>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data de Nascimento</label>
                        <input type="date" id="nascimento" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Renda Aproximada</label>
                        <input type="text" id="renda" placeholder="R$ 0.00" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
                    <input type="password" id="senha" required class="w-full px-3 py-2 border border-gray-300 rounded-md outline-none focus:ring-2 focus:ring-slate-500">
                    
                    <div class="mt-2 space-y-1 bg-slate-50 p-3 rounded-md border border-slate-100">
                        <p class="text-xs text-gray-600 mb-1 font-semibold">A senha deve conter:</p>
                        <ul class="space-y-1">
                            <li id="reqLength" class="error-text">• Mínimo de 8 caracteres</li>
                            <li id="reqUpper" class="error-text">• Pelo menos uma letra maiúscula</li>
                            <li id="reqNumber" class="error-text">• Pelo menos um número</li>
                            <li id="reqSpecial" class="error-text">• Pelo menos um caractere especial (!@#$%^&*)</li>
                        </ul>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 px-6 rounded-md transition-colors font-bold text-lg shadow-md">
                        Salvar Cadastro
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function salvarCadastro(event) {
            event.preventDefault();

            const dadosCliente = {
                Nome_completo: document.getElementById('nome').value,
                Cpf: document.getElementById('cpf').value,
                Data_nascimento: document.getElementById('nascimento').value, // Formato YYYY-MM-DD
                Telefone: document.getElementById('telefone').value,
                // Converte "2500,00" ou "2500.00" para número puro
                Renda_aproximada: parseFloat(document.getElementById('renda').value.replace(',', '.')),
                Email: document.getElementById('email').value
            };

            try {
                const response = await fetch('http://localhost:5107/api/clientes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCliente)
                });

                if (response.ok) {
                    alert("✅ Cadastro da Luxx Motors concluído!");
                    window.location.href = "cadastro.html";
                } else {
                    // Tenta ler a mensagem de erro específica que vem do C#
                    const erroServidor = await response.json();
                    
                    if (response.status === 409 || response.status === 400) {
                        alert("⚠️ Este CPF já está cadastrado! Tente fazer o login ou agendar direto.");
                    } else {
                        alert("❌ Erro no servidor. Tente novamente mais tarde.");
                    }
                }
            } catch (error) {
                console.error("Erro na conexão:", error);
            }
        }

        // Validação de Senha em tempo real
        const senhaInput = document.getElementById('senha');
        senhaInput.addEventListener('input', (e) => {
            const val = e.target.value;
            
            const updateReq = (id, condition) => {
                const el = document.getElementById(id);
                el.className = condition ? 'success-text' : 'error-text';
                // Garante que o ícone mude de • para ✓
                el.innerHTML = (condition ? '✓ ' : '• ') + el.innerHTML.replace(/[✓•]\s/, '');
            };

            updateReq('reqLength', val.length >= 8);
            updateReq('reqUpper', /[A-Z]/.test(val));
            updateReq('reqNumber', /[0-9]/.test(val));
            updateReq('reqSpecial', /[!@#$%^&*(),.?":{}|<>]/.test(val));
        });

        // Máscara CPF
        document.getElementById('cpf').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        // Máscara Telefone
        document.getElementById('telefone').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d{5})(\d)/, "$1-$2");
            e.target.value = v;
        });

        // Máscara Renda Simples
        document.getElementById('renda').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = (Number(v) / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            e.target.value = v;
        });

        document.getElementById('formCadastro').addEventListener('submit', async e => {
            e.preventDefault();

            // Captura os elementos e imprime no console para debugar
            const elNome = document.getElementById('nome');
            const elCpf = document.getElementById('cpf');
            const elNascimento = document.getElementById('nascimento');
            const elTelefone = document.getElementById('telefone');
            const elRenda = document.getElementById('renda');
            const elEmail = document.getElementById('email');

            // Se algum for null, o console vai dizer QUAL é o culpado
            if (!elNome) console.error("Faltando ID: nome");
            if (!elCpf) console.error("Faltando ID: cpf");
            if (!elNascimento) console.error("Faltando ID: nascimento");
            if (!elTelefone) console.error("Faltando ID: telefone");
            if (!elRenda) console.error("Faltando ID: renda");
            if (!elEmail) console.error("Faltando ID: email");

            if (!elNome || !elCpf || !elNascimento || !elTelefone || !elRenda || !elEmail) {
                alert("Erro: Verifique os IDs do formulário no HTML.");
                return;
            }

            const dadosCliente = {
                Nome_completo: elNome.value,
                Cpf: elCpf.value,
                Data_nascimento: elNascimento.value,
                Telefone: elTelefone.value,
                // Limpa o "R$" e a vírgula para mandar só número pro C#
                Renda_aproximada: parseFloat(elRenda.value.replace('R$', '').replace('.', '').replace(',', '.').trim()) || 0,
                Email: elEmail.value
            };

            try {
                // Envio real para o Banco de Dados via API
                const response = await fetch('http://localhost:5107/api/clientes', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCliente)
                });

                if (response.ok) {
                    alert('✅ Cadastro realizado com sucesso na LUXX MOTORS!');
                    // Redireciona para o agendamento após o sucesso real no banco
                    window.location.href = "testdrive.html"; 
                } else {
                    const erroDetalhe = await response.json();
                    alert('❌ Erro ao salvar no banco: ' + (erroDetalhe.mensagem || 'Verifique os dados.'));
                }
            } catch (error) {
                console.error("Erro na conexão:", error);
                alert('❌ Servidor offline. Verifique se a API C# está rodando.');
            }
        });

    </script>

        <!-- Plugin de acessibilidade VLibras -->
        <div vw class="enabled">
            <div vw-access-button class="active"></div>
            <div vw-plugin-wrapper>
                <div class="vw-plugin-top-wrapper"></div>
            </div>
        </div>
        <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
        <script>
            new window.VLibras.Widget('https://vlibras.gov.br/app');
        </script>
</body>
</html>
